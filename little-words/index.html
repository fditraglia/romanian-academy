<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'><rect width='1' height='2' fill='%23002B7F'/><rect x='1' width='1' height='2' fill='%23FCD116'/><rect x='2' width='1' height='2' fill='%23CE1126'/></svg>">
<title>Romanian little words that matter — drill</title>
<style>
  :root {
    --bg: #fbf7f0;
    --fg: #2a2a2a;
    --muted: #6a6a6a;
    --line: #d8d4cc;
    --accent: #8c2d2d;
    --good: #2d8c4d;
    --bad: #b03030;
    --pill: #efe9dc;
    --latin: #5a4a8c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 17px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { max-width: 760px; margin: 0 auto; padding: 18px 16px 64px; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin-bottom: 16px; }
  .modes { display: flex; gap: 4px; margin-bottom: 14px;
    border: 1px solid var(--line); border-radius: 10px; padding: 4px; background: #fff; }
  .modes button { flex: 1; border: 0; background: transparent; padding: 8px 6px;
    border-radius: 7px; font: inherit; color: var(--fg); cursor: pointer; }
  .modes button.active { background: var(--accent); color: #fff; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .filters label { font-size: 0.88rem; padding: 5px 11px; border: 1px solid var(--line);
    border-radius: 999px; background: #fff; cursor: pointer; user-select: none; }
  .filters input { display: none; }
  .filters label:has(input:checked) { background: var(--pill); border-color: var(--accent);
    font-weight: 600; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 18px; margin-bottom: 12px; }
  .pose { font-size: 0.95rem; color: var(--muted); margin-bottom: 6px; }
  .pose .cat { color: var(--accent); font-weight: 600; }
  .prompt { font-size: 1.7rem; font-weight: 700; margin: 8px 0 4px; }
  .answer { font-size: 1.5rem; font-weight: 700; margin: 14px 0 4px; color: var(--fg); }
  .answer.hidden { color: var(--muted); font-size: 1rem; }
  .note { color: var(--muted); font-size: 0.92rem; margin-top: 8px; line-height: 1.45; }
  .alts { color: var(--muted); font-size: 0.92rem; margin-top: 2px; }
  .ety { color: var(--latin); font-size: 0.88rem; margin-top: 6px; font-style: italic; }
  .ety::before { content: "⮌ "; font-style: normal; }
  .examples { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
  .ex { display: flex; align-items: baseline; gap: 9px; padding: 6px 0;
    border-top: 1px dashed var(--line); }
  .ex:first-child { border-top: 0; }
  .ex .ex-ro { font-weight: 600; }
  .ex .ex-en { color: var(--muted); }
  .ex .ex-sense { color: var(--accent); font-size: 0.78rem; font-weight: 600;
    background: var(--pill); border-radius: 999px; padding: 1px 8px; white-space: nowrap; }
  .ex .ex-play { margin-left: auto; padding: 3px 9px; font-size: 0.85rem;
    border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; }
  .ex .ex-play:disabled { opacity: 0.35; cursor: default; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  button.btn { font: inherit; padding: 9px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff; cursor: pointer; }
  button.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.btn:disabled { opacity: 0.4; cursor: default; }
  .choices { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px; margin-top: 18px; }
  .choices button { font: inherit; padding: 10px 8px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff; cursor: pointer; min-height: 44px; }
  .choices button.good { background: var(--good); color: #fff; border-color: var(--good); }
  .choices button.bad { background: var(--bad); color: #fff; border-color: var(--bad); }
  .input-row { margin-top: 14px; }
  input[type=text] { font: inherit; font-size: 1.15rem; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 8px; width: 100%;
    background: #fff; color: var(--fg); }
  input[type=text].good { border-color: var(--good); }
  input[type=text].bad { border-color: var(--bad); }
  .score { margin-left: auto; color: var(--muted); font-size: 0.9rem;
    font-variant-numeric: tabular-nums; }
  .footer { display: flex; align-items: center; margin-top: 6px; }
  .ref-cat { background: #fff; border: 1px solid var(--line); border-radius: 14px;
    margin-bottom: 12px; overflow: hidden; }
  .ref-cat h2 { margin: 0; padding: 12px 16px; font-size: 1rem;
    background: var(--pill); border-bottom: 1px solid var(--line); }
  .ref-item { padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .ref-item:last-child { border-bottom: 0; }
  .ref-head { display: flex; align-items: baseline; gap: 10px; }
  .ref-ro { font-weight: 700; font-size: 1.1rem; }
  .ref-gloss { color: var(--muted); }
  .ref-play { margin-left: auto; padding: 4px 10px; font-size: 0.9rem;
    border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; }
  .ref-play:disabled { opacity: 0.35; cursor: default; }
  .muted { color: var(--muted); }
  .kbd { font-family: ui-monospace, Menlo, monospace; background: var(--pill);
    padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }
  .helper { color: var(--muted); font-size: 0.85rem; margin-top: 10px; }
</style>
</head>
<body>
<div style="max-width:720px;margin:0 auto 14px;display:flex;align-items:center;gap:9px;padding:8px 16px 10px;border-bottom:1px solid #d8d4cc;font:15px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;"><a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:#8c2d2d;font-weight:600;"><span style="display:inline-block;width:21px;height:14px;border-radius:2px;background:linear-gradient(90deg,#002B7F 0 33.34%,#FCD116 33.34% 66.67%,#CE1126 66.67% 100%);box-shadow:0 0 0 1px rgba(0,0,0,.08);"></span>Romanian.Academy</a><a href="/" style="margin-left:auto;text-decoration:none;color:#8c2d2d;">All tools &rarr;</a></div>


<h1>Little words that matter</h1>
<div class="sub">Cuvintele mici care contează — connectives, time words, prepositions, the little glue of Romanian</div>

<div class="modes">
  <button id="m-produce" class="active">Produce</button>
  <button id="m-recognize">Recognize</button>
  <button id="m-ref">Reference</button>
</div>

<div id="filter-wrap" class="filters"></div>

<div id="view"></div>

<script>
let DATA = [];                 // [{category, label, items:[...]}]
let ALL_ITEMS = [];            // flat, enriched with _cat, _catLabel
let activeCats = new Set();    // empty = all
let mode = "produce";
let state = null;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function audioSrc(hash) {
  return (window.AUDIO_MAP && window.AUDIO_MAP[hash])
    || `../audio/${hash}.mp3`;
}

function play(hash) {
  if (!hash) return;
  const a = new Audio(audioSrc(hash));
  a.play().catch(() => {});
}

function esc(s) {
  return (s || "").replace(/[&<>"]/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function normalize(s) {
  // diacritic + case-insensitive; strip punctuation + whitespace
  return s.normalize("NFD")
          .replace(/[̀-ͯ]/g, "")
          .replace(/[.,?!;:\-—()\s…]/g, "")
          .toLowerCase();
}

function answerOk(typed, item) {
  const t = normalize(typed);
  if (!t) return false;
  if (normalize(item.ro) === t) return true;
  if (Array.isArray(item.ro_alt)) {
    return item.ro_alt.some(a => normalize(a) === t);
  }
  return false;
}

function currentPool() {
  if (activeCats.size === 0) return ALL_ITEMS;
  return ALL_ITEMS.filter(x => activeCats.has(x._cat));
}

// shared: render an item's examples (with per-example audio) as a block
function examplesHtml(item) {
  if (!item.examples || !item.examples.length) return "";
  return `<div class="examples">` + item.examples.map(ex => `
    <div class="ex">
      <span class="ex-ro">${esc(ex.ro)}</span>
      <span class="ex-en">${esc(ex.en)}</span>
      ${ex.sense ? `<span class="ex-sense">${esc(ex.sense)}</span>` : ""}
      <button class="ex-play" data-h="${ex.audio || ""}" ${ex.audio?"":"disabled"}>▶</button>
    </div>`).join("") + `</div>`;
}

function wireExamplePlay(root) {
  root.querySelectorAll(".ex-play[data-h]").forEach(b => {
    b.addEventListener("click", () => play(b.dataset.h));
  });
}

// ---------- mode: produce (English gloss → type the Romanian) ----------
function renderProduce() {
  const view = document.getElementById("view");
  const pool = currentPool();
  if (!pool.length) { view.innerHTML = `<p class="muted">No groups selected.</p>`; return; }
  if (!state || state.mode !== "produce") {
    state = { mode: "produce", queue: shuffle([...pool]), i: 0, score: {right: 0, total: 0} };
  }
  const item = state.queue[state.i % state.queue.length];
  view.innerHTML = `
    <div class="card">
      <div class="pose"><span class="cat">${item._catLabel}</span> · say it in Romanian</div>
      <div class="prompt">${esc(item.prompt)}</div>
      <div class="input-row">
        <input id="ans" type="text" autocomplete="off" autocapitalize="off"
          autocorrect="off" spellcheck="false" placeholder="type the Romanian…">
      </div>
      <div class="answer hidden" id="reveal">…</div>
      <div id="extra" style="display:none">
        ${item.ro_alt ? `<div class="alts">also: ${item.ro_alt.map(esc).join(", ")}</div>` : ""}
        ${item.note ? `<div class="note">${esc(item.note)}</div>` : ""}
        ${item.ety ? `<div class="ety">${esc(item.ety)}</div>` : ""}
        ${examplesHtml(item)}
      </div>
      <div class="row">
        <button class="btn primary" id="check">Check</button>
        <button class="btn" id="show">Show</button>
        <button class="btn" id="play-audio" disabled>▶ hear</button>
      </div>
      <div class="footer">
        <span class="helper">Enter = check / next · <span class="kbd">?</span> = show</span>
        <span class="score">${state.score.right}/${state.score.total}</span>
      </div>
    </div>`;
  const inp = document.getElementById("ans");
  const reveal = document.getElementById("reveal");
  const extra = document.getElementById("extra");
  const checkBtn = document.getElementById("check");
  const showBtn = document.getElementById("show");
  const playBtn = document.getElementById("play-audio");
  let revealed = false;
  wireExamplePlay(extra);

  function doReveal(scored) {
    revealed = true;
    reveal.textContent = item.ro;
    reveal.classList.remove("hidden");
    extra.style.display = "block";
    playBtn.disabled = !item.audio;
    if (item.audio) play(item.audio);
    checkBtn.textContent = "Next →";
    showBtn.disabled = true;
    if (scored !== null) state.score.total += 1;
    if (scored === true) state.score.right += 1;
  }

  function advance() {
    state.i += 1;
    if (state.i % state.queue.length === 0) state.queue = shuffle([...pool]);
    renderProduce();
  }

  inp.focus();
  inp.addEventListener("input", () => inp.classList.remove("good", "bad"));
  checkBtn.addEventListener("click", () => {
    if (revealed) { advance(); return; }
    const ok = answerOk(inp.value, item);
    inp.classList.add(ok ? "good" : "bad");
    doReveal(ok);
  });
  showBtn.addEventListener("click", () => doReveal(null));
  playBtn.addEventListener("click", () => play(item.audio));
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); checkBtn.click(); }
    else if (e.key === "?" && !inp.value) { e.preventDefault(); showBtn.click(); }
  });
}

// gloss-overlap guard: two items "conflict" if their English glosses share
// a content word, so Recognize never offers two defensibly-correct options
// (e.g. pentru că / fiindcă / căci all gloss "because").
const GLOSS_STOP = new Set(["the","a","an","of","to","in","on","it","is","or","and"]);
function glossWords(s) {
  return new Set((s || "").toLowerCase().replace(/\([^)]*\)/g, " ")
    .split(/[^a-z]+/).filter(w => w.length > 1 && !GLOSS_STOP.has(w)));
}
function glossConflict(a, b) {
  const wb = glossWords(b.prompt);
  for (const w of glossWords(a.prompt)) if (wb.has(w)) return true;
  return false;
}

// ---------- mode: recognize (read/hear the Romanian → pick the meaning) ----------
function renderRecognize() {
  const view = document.getElementById("view");
  const pool = currentPool();
  if (!pool.length) { view.innerHTML = `<p class="muted">No groups selected.</p>`; return; }
  if (!state || state.mode !== "recognize") {
    state = { mode: "recognize", queue: shuffle([...pool]), i: 0, score: {right: 0, total: 0} };
  }
  const item = state.queue[state.i % state.queue.length];

  // distractors: same group, but never one whose English gloss overlaps the
  // answer's — so two defensibly-correct options can't both be offered.
  const others = ALL_ITEMS.filter(x =>
    x._cat === item._cat && x.key !== item.key && !glossConflict(item, x));
  const choices = shuffle([item, ...shuffle([...others]).slice(0, 5)]);

  view.innerHTML = `
    <div class="card">
      <div class="pose"><span class="cat">${item._catLabel}</span> · read it, pick the meaning</div>
      <div class="prompt">${esc(item.ro)}
        <button class="btn icon" id="play-audio" ${item.audio?"":"disabled"}
          title="hear it" style="font-size:0.85rem;padding:4px 11px;vertical-align:middle">▶</button>
      </div>
      ${item.ro_alt ? `<div class="alts">also: ${item.ro_alt.map(esc).join(", ")}</div>` : ""}
      <div class="choices" id="choices">
        ${choices.map(c => `<button data-k="${esc(c.key)}">${esc(c.prompt)}</button>`).join("")}
      </div>
      <div id="reveal" style="display:none;margin-top:16px">
        ${item.note ? `<div class="note">${esc(item.note)}</div>` : ""}
        ${item.ety ? `<div class="ety">${esc(item.ety)}</div>` : ""}
        ${examplesHtml(item)}
        <div class="row"><button class="btn primary" id="next">Next →</button></div>
      </div>
      <div class="footer"><span class="score">${state.score.right}/${state.score.total}</span></div>
    </div>`;

  const reveal = document.getElementById("reveal");
  const choicesEl = document.getElementById("choices");
  let answered = false;

  function advance() {
    state.i += 1;
    if (state.i % state.queue.length === 0) state.queue = shuffle([...pool]);
    renderRecognize();
  }

  document.getElementById("play-audio").addEventListener("click", () => play(item.audio));
  choicesEl.querySelectorAll("button").forEach(b => {
    b.addEventListener("click", () => {
      if (answered) return;
      answered = true;
      const ok = b.dataset.k === item.key;
      state.score.total += 1;
      if (ok) state.score.right += 1;
      choicesEl.querySelectorAll("button").forEach(bb => {
        if (bb.dataset.k === item.key) bb.classList.add("good");
        else if (bb === b) bb.classList.add("bad");
      });
      reveal.style.display = "block";
      wireExamplePlay(reveal);
      document.getElementById("next").addEventListener("click", advance);
    });
  });
}

// ---------- mode: reference ----------
function renderRef() {
  const view = document.getElementById("view");
  const cats = (activeCats.size === 0
                ? DATA
                : DATA.filter(d => activeCats.has(d.category)));
  if (!cats.length) { view.innerHTML = `<p class="muted">No groups selected.</p>`; return; }
  view.innerHTML = cats.map(d => `
    <section class="ref-cat">
      <h2>${esc(d.label)}</h2>
      ${d.items.map(it => `
        <div class="ref-item">
          <div class="ref-head">
            <span class="ref-ro">${esc(it.ro)}</span>
            <span class="ref-gloss">${esc(it.prompt)}</span>
            <button class="ref-play" data-h="${it.audio || ""}" ${it.audio?"":"disabled"}>▶</button>
          </div>
          ${it.ro_alt ? `<div class="alts">also: ${it.ro_alt.map(esc).join(", ")}</div>` : ""}
          ${it.note ? `<div class="note">${esc(it.note)}</div>` : ""}
          ${it.ety ? `<div class="ety">${esc(it.ety)}</div>` : ""}
          ${examplesHtml(it)}
        </div>`).join("")}
    </section>`).join("");
  view.querySelectorAll(".ref-play[data-h]").forEach(b => {
    b.addEventListener("click", () => play(b.dataset.h));
  });
  wireExamplePlay(view);
}

// ---------- filters ----------
function renderFilters() {
  const wrap = document.getElementById("filter-wrap");
  wrap.innerHTML =
    `<label><input type="checkbox" id="all-on" ${activeCats.size===0?"checked":""}>
      <span>All</span></label>` +
    DATA.map(d => `
    <label><input type="checkbox" value="${esc(d.category)}" ${activeCats.has(d.category)?"checked":""}>
      <span>${esc(d.label)}</span></label>`).join("");
  wrap.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("change", () => {
      if (inp.id === "all-on") activeCats = new Set();
      else if (inp.checked) activeCats.add(inp.value);
      else activeCats.delete(inp.value);
      state = null;
      renderFilters();
      route();
    });
  });
}

function route() {
  if (mode === "produce") renderProduce();
  else if (mode === "recognize") renderRecognize();
  else renderRef();
}

function setMode(m) {
  mode = m;
  state = null;
  ["produce","recognize","ref"].forEach(x => {
    document.getElementById("m-"+x).classList.toggle("active", x === m);
  });
  route();
}

async function load() {
  const txt = window.EMBEDDED_DATA
    || await fetch("data.jsonl").then(r => r.text());
  DATA = txt.split("\n").filter(Boolean).map(l => JSON.parse(l));
  ALL_ITEMS = DATA.flatMap(d =>
    d.items.map(it => ({...it, _cat: d.category, _catLabel: d.label})));
  renderFilters();
  document.getElementById("m-produce").addEventListener("click", () => setMode("produce"));
  document.getElementById("m-recognize").addEventListener("click", () => setMode("recognize"));
  document.getElementById("m-ref").addEventListener("click", () => setMode("ref"));
  route();
}
load();
</script>

</body>
</html>
