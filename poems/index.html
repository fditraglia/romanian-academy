<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Poem — memorize</title>
<style>
  :root {
    --bg: #fbf7f0;
    --fg: #2a2a2a;
    --muted: #6a6a6a;
    --line: #d8d4cc;
    --accent: #8c2d2d;
    --pill: #efe9dc;
    --active: #fff4d6;
    --active-border: #c89a2d;
    --latin: #5a4a8c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 17px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { max-width: 680px; margin: 0 auto; padding: 18px 16px 64px; }
  header { margin-bottom: 14px; }
  h1 { font-size: 1.35rem; margin: 0 0 2px; font-style: italic; }
  .author { color: var(--muted); font-size: 0.95rem; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 12px; margin-bottom: 12px; }
  button.btn { font: inherit; padding: 9px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff; cursor: pointer; }
  button.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.btn.icon { padding: 9px 12px; min-width: 44px; }
  .time { font-variant-numeric: tabular-nums; color: var(--muted);
    font-size: 0.9rem; margin-left: auto; }
  .obs { display: flex; gap: 4px; border: 1px solid var(--line);
    border-radius: 9px; padding: 3px; background: #fff;
    margin-bottom: 14px; }
  .obs button { flex: 1; border: 0; background: transparent; padding: 8px 6px;
    border-radius: 7px; font: inherit; color: var(--fg); cursor: pointer; }
  .obs button.active { background: var(--accent); color: #fff; }
  .poem { background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 22px; }
  .poem.mono .line-text { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 1.05rem; letter-spacing: 0.04em; }
  .stanza + .stanza { margin-top: 14px; }
  .line { display: flex; align-items: baseline; gap: 10px;
    padding: 4px 6px; border-radius: 6px; cursor: pointer; margin: 1px 0;
    border-left: 3px solid transparent; }
  .line:hover { background: var(--pill); }
  .line.active { background: var(--active); border-left-color: var(--active-border); }
  .line-num { color: var(--muted); font-size: 0.8rem; min-width: 1.5em;
    text-align: right; font-variant-numeric: tabular-nums; }
  .line-text { font-size: 1.1rem; line-height: 1.55; }
  /* collapsed glossary panel — present but quiet; clean view stays default */
  details.vocab { margin-top: 16px; background: #fff; border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; }
  details.vocab > summary { cursor: pointer; padding: 12px 16px; font-size: 0.95rem;
    color: var(--accent); font-weight: 600; list-style: none; user-select: none; }
  details.vocab > summary::-webkit-details-marker { display: none; }
  details.vocab > summary::before { content: "▸ "; }
  details.vocab[open] > summary::before { content: "▾ "; }
  details.vocab > summary .count { color: var(--muted); font-weight: 400; }
  .gloss-list { padding: 0 16px 8px; }
  .gloss { padding: 9px 0; border-top: 1px solid var(--line); }
  .gloss:first-child { border-top: 0; }
  .gloss .g-ro { font-weight: 600; }
  .gloss .g-en { color: var(--fg); }
  .gloss .g-note { color: var(--latin); font-size: 0.88rem; font-style: italic;
    margin-top: 2px; }
  .gloss .g-note::before { content: "⮌ "; font-style: normal; }
  .hint { color: var(--muted); font-size: 0.85rem; margin-top: 14px;
    line-height: 1.5; }
  .kbd { font-family: ui-monospace, Menlo, monospace; background: var(--pill);
    padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }
</style>
</head>
<body>
<div style="max-width:720px;margin:0 auto 14px;display:flex;align-items:center;gap:9px;padding:8px 16px 10px;border-bottom:1px solid #d8d4cc;font:15px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;"><a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:#8c2d2d;font-weight:600;"><span style="display:inline-block;width:21px;height:14px;border-radius:2px;background:linear-gradient(90deg,#002B7F 0 33.34%,#FCD116 33.34% 66.67%,#CE1126 66.67% 100%);box-shadow:0 0 0 1px rgba(0,0,0,.08);"></span>Romanian.Academy</a><a href="/" style="margin-left:auto;text-decoration:none;color:#8c2d2d;">All tools &rarr;</a></div>


<header>
  <h1 id="title">…</h1>
  <div class="author" id="author"></div>
</header>

<div class="controls">
  <button class="btn primary icon" id="play">▶</button>
  <button class="btn icon" id="restart" title="Restart">⟲</button>
  <span class="time"><span id="now">0:00</span> / <span id="dur">0:00</span></span>
</div>

<div class="obs" id="obs">
  <button data-m="full" class="active">Full</button>
  <button data-m="initials">First letter</button>
  <button data-m="blanks">Silhouette</button>
</div>

<div class="poem" id="poem"></div>

<details class="vocab" id="vocab" hidden>
  <summary>Vocabular <span class="count" id="vocab-count"></span></summary>
  <div class="gloss-list" id="gloss-list"></div>
</details>

<div class="hint">
  <span class="kbd">Space</span> play/pause ·
  <span class="kbd">F</span>/<span class="kbd">I</span>/<span class="kbd">B</span> obscuration ·
  <span class="kbd">R</span> restart ·
  <span class="kbd">click a line</span> to replay just that line
</div>

<script>
let DATA = null;
let LINES = [];          // flat: {text, start, end, lineIdx, line_audio, el}
let audio = null;        // whole-poem recording (▶ button + highlighting)
let lineAudio = null;    // per-line clip currently playing, if any
let mode = "full";
let activeLine = -1;
let singleLineEnd = null;  // legacy fallback for lines w/o a per-line clip

function poemSlug() {
  const p = new URLSearchParams(location.search).get("poem");
  // accept only a safe slug; default to somnoroase
  return (p && /^[a-z0-9-]+$/.test(p)) ? p : "somnoroase";
}

function audioSrc(hash) {
  return (window.AUDIO_MAP && window.AUDIO_MAP[hash])
    || `../audio/${hash}.mp3`;
}

function esc(s) {
  return (s || "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

function obscure(text, m) {
  if (m === "full") return text;
  if (m === "initials") {
    return text.replace(/(\p{L})(\p{L}+)/gu,
      (_, f, rest) => f + "_".repeat(rest.length));
  }
  if (m === "blanks") {
    return text.replace(/\p{L}/gu, "_");
  }
  return text;
}

function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60), r = s % 60;
  return `${m}:${String(r).padStart(2, "0")}`;
}

function renderPoem() {
  const wrap = document.getElementById("poem");
  wrap.className = "poem" + (mode === "full" ? "" : " mono");
  wrap.innerHTML = "";
  let lineIdx = 0;
  DATA.stanzas.forEach((stanza, si) => {
    const st = document.createElement("div");
    st.className = "stanza";
    stanza.forEach(c => {
      const row = document.createElement("div");
      row.className = "line";
      row.dataset.idx = lineIdx;
      row.innerHTML =
        `<span class="line-num">${lineIdx + 1}</span>` +
        `<span class="line-text">${obscure(c.line, mode)}</span>`;
      row.addEventListener("click", () => playLine(parseInt(row.dataset.idx)));
      LINES[lineIdx].el = row;
      st.appendChild(row);
      lineIdx++;
    });
    wrap.appendChild(st);
  });
  applyActiveHighlight();
}

function renderGlosses() {
  const glosses = DATA.glosses || [];
  const panel = document.getElementById("vocab");
  if (!glosses.length) { panel.hidden = true; return; }
  panel.hidden = false;
  document.getElementById("vocab-count").textContent = `(${glosses.length})`;
  document.getElementById("gloss-list").innerHTML = glosses.map(g => `
    <div class="gloss">
      <span class="g-ro">${esc(g.ro)}</span> — <span class="g-en">${esc(g.en)}</span>
      ${g.note ? `<div class="g-note">${esc(g.note)}</div>` : ""}
    </div>`).join("");
}

function applyActiveHighlight() {
  LINES.forEach((l, i) => {
    if (l.el) l.el.classList.toggle("active", i === activeLine);
  });
  if (activeLine >= 0 && LINES[activeLine].el) {
    const r = LINES[activeLine].el.getBoundingClientRect();
    if (r.top < 80 || r.bottom > window.innerHeight - 40) {
      LINES[activeLine].el.scrollIntoView({behavior: "smooth", block: "center"});
    }
  }
}

function onTime() {
  const t = audio.currentTime;
  document.getElementById("now").textContent = fmtTime(t);
  let nl = -1;
  for (let i = 0; i < LINES.length; i++) {
    if (LINES[i].start <= t + 0.02) nl = i;
    else break;
  }
  if (nl !== activeLine) {
    activeLine = nl;
    applyActiveHighlight();
  }
  if (singleLineEnd !== null && t >= singleLineEnd) {
    audio.pause();
    singleLineEnd = null;
  }
}

function stopLineAudio() {
  if (lineAudio) { lineAudio.pause(); lineAudio = null; }
}

function togglePlay() {
  if (audio.paused) {
    stopLineAudio();
    singleLineEnd = null;
    audio.play();
  } else {
    audio.pause();
  }
}

function playLine(i) {
  stopLineAudio();
  const line = LINES[i];
  audio.pause();
  audio.currentTime = line.start;
  singleLineEnd = null;
  activeLine = i;
  applyActiveHighlight();
  if (line.line_audio) {
    lineAudio = new Audio(audioSrc(line.line_audio));
    lineAudio.play();
  } else {
    singleLineEnd = line.end - 0.05;
    audio.play();
  }
}

function restart() {
  stopLineAudio();
  audio.currentTime = 0;
  singleLineEnd = null;
  audio.play();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll("#obs button").forEach(b => {
    b.classList.toggle("active", b.dataset.m === m);
  });
  renderPoem();
}

async function load() {
  DATA = window.EMBEDDED_DATA
    || await fetch(`${poemSlug()}.json`).then(r => r.json());
  document.title = (DATA.title || "Poem") + " — memorize";
  document.getElementById("title").textContent = DATA.title || "(untitled)";
  document.getElementById("author").textContent = DATA.author || "";
  document.getElementById("dur").textContent = fmtTime(DATA.duration_s);

  let li = 0;
  DATA.stanzas.forEach(stanza => {
    stanza.forEach(c => {
      LINES.push({text: c.line, start: c.start_s, end: 0, idx: li,
                  line_audio: c.line_audio || null, el: null});
      li++;
    });
  });
  for (let i = 0; i < LINES.length - 1; i++) LINES[i].end = LINES[i + 1].start;
  LINES[LINES.length - 1].end = DATA.duration_s;

  audio = new Audio(audioSrc(DATA.audio_hash));
  audio.preload = "auto";
  audio.addEventListener("timeupdate", onTime);
  audio.addEventListener("play", () => document.getElementById("play").textContent = "⏸");
  audio.addEventListener("pause", () => document.getElementById("play").textContent = "▶");
  audio.addEventListener("ended", () => {
    activeLine = -1; applyActiveHighlight();
  });

  document.getElementById("play").addEventListener("click", togglePlay);
  document.getElementById("restart").addEventListener("click", restart);
  document.querySelectorAll("#obs button").forEach(b => {
    b.addEventListener("click", () => setMode(b.dataset.m));
  });
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === " ") { e.preventDefault(); togglePlay(); }
    else if (e.key === "f" || e.key === "F") setMode("full");
    else if (e.key === "i" || e.key === "I") setMode("initials");
    else if (e.key === "b" || e.key === "B") setMode("blanks");
    else if (e.key === "r" || e.key === "R") restart();
  });

  renderPoem();
  renderGlosses();
}
load();
</script>

</body>
</html>
